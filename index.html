<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Service Mini App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: Arial, sans-serif; background-color: #121212; color: #ffffff; margin: 0; padding: 15px; }
        .tab-buttons { display: flex; justify-content: space-around; background: #1e1e1e; padding: 8px; border-radius: 10px; margin-bottom: 15px; }
        .tab-btn { background: none; border: none; color: #888; font-weight: bold; font-size: 13px; cursor: pointer; padding: 8px; }
        .tab-btn.active { color: #f7a600; border-bottom: 2px solid #f7a600; }
        .tab-content { display: none; background: #1e1e1e; padding: 15px; border-radius: 10px; }
        .tab-content.active { display: block; }
        input { width: 100%; padding: 10px; margin: 8px 0; border-radius: 5px; border: 1px solid #333; background: #2a2a2a; color: white; box-sizing: border-box; }
        .btn { width: 100%; background: #f7a600; color: black; font-weight: bold; padding: 12px; border: none; border-radius: 5px; cursor: pointer; margin-top: 10px; }
        .card { background: #2a2a2a; padding: 10px; border-radius: 8px; margin-bottom: 10px; display: flex; justify-content: space-between; }
    </style>
</head>
<body>

    <!-- Tab Menu -->
    <div class="tab-buttons">
        <button class="tab-btn active" onclick="switchTab('mint')">🔄 Mint Ex</button>
        <button class="tab-btn" onclick="switchTab('forex')">🌐 ငွေလဲနှုန်း</button>
        <button class="tab-btn" onclick="switchTab('gold')">🥇 ရွှေဈေး</button>
    </div>

    <!-- 1. Mint Exchange -->
    <div id="mint" class="tab-content active">
        <h3>THB ➡️ MMK Exchange</h3>
        <input type="number" id="thbAmount" placeholder="ထိုင်းဘတ် ပမာဏ ရိုက်ပါ" oninput="calculateExchange()">
        <p>ပေါက်ဈေး (1 THB): <b>135 MMK</b></p>
        <h4>ရရှိမည့်ကျပ်: <span id="mmkResult" style="color: #00ff66;">0</span> MMK</h4>
        <button class="btn" onclick="sendOrder()">အော်ဒါတင်မည်</button>
    </div>

    <!-- 2. Forex -->
    <div id="forex" class="tab-content">
        <h3>နိုင်ငံတကာ ငွေပေါက်ဈေး</h3>
        <div class="card"><span>🇺🇸 USD / MMK</span> <b>4,200 Kyat</b></div>
        <div class="card"><span>🇹🇭 THB / MMK</span> <b>135 Kyat</b></div>
    </div>

    <!-- 3. Gold -->
    <div id="gold" class="tab-content">
        <h3>ရွှေဈေးနှုန်းများ</h3>
        <div class="card"><span>🇲🇲 အခေါက်ရွှေ (၁ ပဲရည်)</span> <b>5,800,000 Kyat</b></div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        function calculateExchange() {
            const thb = document.getElementById('thbAmount').value;
            document.getElementById('mmkResult').innerText = (thb * 135).toLocaleString();
        }

        function sendOrder() {
            tg.showAlert("သင့်အော်ဒါကို လက်ခံရရှိပါသည်။");
        }
    </script>
</body>
</html>
