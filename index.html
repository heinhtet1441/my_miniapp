<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Enterprise Mini App</title>
    <!-- Telegram WebApp SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent: #38bdf8;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --success: #22c55e;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text);
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .container {
            flex: 1;
            padding: 16px;
            overflow-y: auto;
            padding-bottom: 80px;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 16px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .btn {
            width: 100%;
            background-color: var(--accent);
            color: #000;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 15px;
            cursor: pointer;
            margin-top: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-success { background-color: var(--success); color: #fff; }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* Bottom Nav */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background-color: var(--card-bg);
            display: flex;
            justify-content: space-around;
            padding: 12px 0;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .nav-item {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
        }

        .nav-item.active { color: var(--accent); }
    </style>
</head>
<body>

    <div class="container">
        <!-- Tab 1: Finance -->
        <div id="finance-tab" class="tab-content">
            <h2>📈 Finance Dashboard</h2>
            <div class="card">
                <canvas id="marketChart"></canvas>
            </div>
        </div>

        <!-- Tab 2: Gaming -->
        <div id="gaming-tab" class="tab-content">
            <h2>🎮 Tap-to-Earn</h2>
            <div class="card" style="text-align: center;">
                <h1 id="score">0</h1>
                <button class="btn btn-success" onclick="tapGame()">TAP HERE!</button>
            </div>
        </div>

        <!-- Tab 3: Wallet & Utilities (Includes QR & Invoice) -->
        <div id="wallet-tab" class="tab-content active">
            <h2>💳 Wallet & Utilities</h2>
            
            <div class="card">
                <h3>📷 Native Tools</h3>
                <button class="btn" onclick="openQRScanner()"> Scan QR Code 📸</button>
                <button class="btn btn-success" onclick="triggerInvoice()"> Deposit Star / Invoice 💎</button>
            </div>

            <div class="card">
                <h3>📱 Telegram Haptics</h3>
                <button class="btn" onclick="triggerHaptic()">Test Vibration 📳</button>
            </div>
        </div>
    </div>

    <!-- Navigation Bar -->
    <div class="bottom-nav">
        <div class="nav-item" onclick="switchTab('finance-tab', this)">📈 Finance</div>
        <div class="nav-item" onclick="switchTab('gaming-tab', this)">🎮 Gaming</div>
        <div class="nav-item active" onclick="switchTab('wallet-tab', this)">💳 Wallet & Web3</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); // Full screen

        // Switch Tabs Function
        function switchTab(tabId, element) {
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(nav => nav.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            element.classList.add('active');
        }

        // 1. QR Code Scanner Feature
        function openQRScanner() {
            if (tg.showScanQrPopup) {
                tg.showScanQrPopup({ text: "Scan any QR Code" }, function(text) {
                    tg.showAlert("Scanned Content: " + text);
                    return true; // close popup after scan
                });
            } else {
                alert("QR Scanner is only supported on Telegram Mobile App!");
            }
        }

        // 2. Invoice Feature
        function triggerInvoice() {
            tg.showAlert("Invoice requested! (In production, this opens native checkout window)");
            tg.HapticFeedback.notificationOccurred('success');
        }

        // 3. Haptic Feedback
        function triggerHaptic() {
            tg.HapticFeedback.impactOccurred('medium');
        }

        // 4. Tap Game Logic
        let count = 0;
        function tapGame() {
            count++;
            document.getElementById('score').innerText = count;
            tg.HapticFeedback.impactOccurred('light');
        }

        // Initialize Chart.js
        const ctx = document.getElementById('marketChart').getContext('2d');
        new Chart(ctx, {
            type: 'line',
            data: {
                labels: ['Jan', 'Feb', 'Mar', 'Apr', 'May'],
                datasets: [{
                    label: 'TON Price ($)',
                    data: [2.1, 3.5, 4.8, 5.2, 6.7],
                    borderColor: '#38bdf8',
                    tension: 0.4
                }]
            }
        });
    </script>
</body>
</html>
