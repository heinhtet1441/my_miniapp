<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Telegram Mini App Demo</title>
  <!-- Telegram Web App SDK -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--tg-theme-bg-color, #f4f4f5);
      color: var(--tg-theme-text-color, #222);
      margin: 0;
      padding: 15px;
    }
    .card {
      background: var(--tg-theme-secondary-bg-color, #ffffff);
      padding: 15px;
      border-radius: 12px;
      margin-bottom: 15px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }
    h3 { margin-top: 0; color: #2481cc; }
    button {
      width: 100%;
      background-color: var(--tg-theme-button-color, #2481cc);
      color: var(--tg-theme-button-text-color, #ffffff);
      border: none;
      padding: 12px;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
      font-size: 14px;
    }
    button:active { opacity: 0.8; }
    .badge {
      background: #e1f5fe;
      color: #0288d1;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 12px;
    }
  </style>
</head>
<body>

  <!-- 1. Telegram User Profile -->
  <div class="card">
    <h3>👤 User Profile Integration</h3>
    <p>Logged in as: <b id="user-name">Loading...</b></p>
    <p>User ID: <span class="badge" id="user-id">---</span></p>
  </div>

  <!-- 2. Interactive Feature (Tap Game) -->
  <div class="card">
    <h3>🎮 Interactive Logic (Tap Game)</h3>
    <p>Total Score: <b id="score" style="font-size: 20px; color: #4caf50;">0</b></p>
    <button onclick="tapButton()">TAP TO EARN (+1) 🚀</button>
  </div>

  <!-- 3. Dynamic Navigation / Pages -->
  <div class="card">
    <h3>🌐 Navigation & Modules</h3>
    <p id="page-status">Current View: Home</p>
    <button onclick="switchTab('Exchange Market')">Go to Exchange</button><br><br>
    <button onclick="switchTab('Gold Rates')">Go to Gold Rates</button>
  </div>

  <script>
    // Initialize Telegram Web App SDK
    const tg = window.Telegram.WebApp;
    tg.expand(); // Make WebApp full height

    // Display User Data from Telegram Context
    if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
      const user = tg.initDataUnsafe.user;
      document.getElementById('user-name').innerText = `${user.first_name} ${user.last_name || ''}`;
      document.getElementById('user-id').innerText = user.id;
    } else {
      document.getElementById('user-name').innerText = "Guest (Browser Mode)";
    }

    // Tap Game Logic with Haptic Feedback
    let score = 0;
    function tapButton() {
      score++;
      document.getElementById('score').innerText = score;
      
      // Trigger Haptic Feedback on Phone
      if (tg.HapticFeedback) {
        tg.HapticFeedback.impactOccurred('medium');
      }
    }

    // Tab Switching Logic
    function switchTab(tabName) {
      document.getElementById('page-status').innerText = "Current View: " + tabName;
      if (tg.HapticFeedback) {
        tg.HapticFeedback.notificationOccurred('success');
      }
    }
  </script>
</body>
</html>
